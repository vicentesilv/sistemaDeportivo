<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-left">
      <div class="auth-brand">
        <div class="brand-icon"></div>
        <h2>Sistema Deportivo</h2>
        <p>Plataforma de análisis y predicción deportiva</p>
      </div>
      <div class="auth-features">
        <div class="feature">
          <i class="fa-solid fa-chart-line"></i>
          <span>Estadísticas en tiempo real</span>
        </div>
        <div class="feature">
          <i class="fa-solid fa-robot"></i>
          <span>Predicciones con IA</span>
        </div>
        <div class="feature">
          <i class="fa-solid fa-users"></i>
          <span>Gestión de equipos</span>
        </div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-container">
        <h1>Iniciar Sesión</h1>
        <p class="auth-subtitle">Accede a tu cuenta para continuar</p>
        <form [formGroup]="form" (ngSubmit)="login()" class="auth-form">
          <div class="input-group">
            <label for="email">Correo electrónico</label>
            <div class="input-field">
              <i class="fa-solid fa-envelope"></i>
              <input
                id="email"
                type="email"
                formControlName="email"
                placeholder="tu@correo.com"
                [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
              />
            </div>
            <small *ngIf="form.get('email')?.hasError('required') && form.get('email')?.touched" class="error-msg">
              El correo es requerido
            </small>
            <small *ngIf="form.get('email')?.hasError('email') && form.get('email')?.touched" class="error-msg">
              Ingresa un correo válido
            </small>
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="input-field">
              <i class="fa-solid fa-lock"></i>
              <input
                id="password"
                type="password"
                formControlName="password"
                placeholder="••••••••"
                [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
              />
            </div>
            <small *ngIf="form.get('password')?.hasError('required') && form.get('password')?.touched" class="error-msg">
              La contraseña es requerida
            </small>
          </div>

          <button type="submit" class="auth-btn" [disabled]="form.invalid || loading">
            <span *ngIf="!loading">INICIAR SESIÓN</span>
            <span *ngIf="loading" class="spinner"></span>
          </button>
        </form>

        <div class="auth-footer">
          <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
