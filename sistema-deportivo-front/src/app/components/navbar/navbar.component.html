<nav role="navigation" aria-label="Barra de navegación principal">
  <div class="nav-inner">
    <a routerLink="/Futbolistas" class="nav-logo">
      <img src="../../../assets/images/icono.png" alt="Logo" class="nav-logo-img">
      <span class="nav-logo-text">Sistema Deportivo</span>
    </a>

    <div class="nav-links-desktop">
      <a class="link" routerLink="/Futbolistas" routerLinkActive="active">
        <span>⚽</span> Futbolistas
      </a>
      <a class="link" routerLink="/Equipos" routerLinkActive="active">
        <span>🏆</span> Equipos
      </a>
      <a class="link" routerLink="/Predicciones" routerLinkActive="active">
        <span>📊</span> Predicciones
      </a>
      <a class="link" routerLink="/Contacto" routerLinkActive="active">
        <span>📬</span> Contacto
      </a>
    </div>

    <div class="nav-actions">
      <button class="btn-logout" (click)="logOut()" title="Cerrar sesión">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
      <button class="btn-hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <div class="nav-mobile" [class.open]="menuOpen">
    <div class="nav-mobile-bg" (click)="closeMenu()"></div>
    <div class="nav-mobile-panel">
      <a class="link" routerLink="/Futbolistas" routerLinkActive="active" (click)="closeMenu()">
        <span>⚽</span> Futbolistas
      </a>
      <a class="link" routerLink="/Equipos" routerLinkActive="active" (click)="closeMenu()">
        <span>🏆</span> Equipos
      </a>
      <a class="link" routerLink="/Predicciones" routerLinkActive="active" (click)="closeMenu()">
        <span>📊</span> Predicciones
      </a>
      <a class="link" routerLink="/Contacto" routerLinkActive="active" (click)="closeMenu()">
        <span>📬</span> Contacto
      </a>
      <div class="nav-divider"></div>
      <button class="link link-logout" (click)="logOut()">
        <span>🚪</span> Cerrar Sesión
      </button>
    </div>
  </div>
</nav>
